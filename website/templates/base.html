<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ config.description }}">
    <title>{% block title %}{{ config.title }}{% endblock %}</title>
    <link rel="icon" href="{{ get_url(path='logo.svg') }}" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: { extend: { colors: { amber: { 500: '#EAA214' } } } }
    }
    </script>
    <style>
        pre code { font-size: 13px; line-height: 1.6; }
        pre { border-radius: 0.5rem; padding: 1rem; overflow-x: auto; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-300 antialiased min-h-screen">
    <nav class="border-b border-zinc-800/80 px-4 sm:px-6">
        <div class="max-w-6xl mx-auto flex items-center justify-between h-14">
            <a href="{{ get_url(path='') }}" class="flex items-center gap-2">
                <img src="{{ get_url(path='logo.svg') }}" alt="Blixt" class="w-4 h-6">
                <span class="text-sm font-medium text-zinc-200 tracking-wide">Blixt</span>
            </a>
            <div class="flex items-center gap-6 text-[13px]">
                <a href="{{ get_url(path='docs/getting-started/installation/') }}" class="text-zinc-400 hover:text-zinc-200 transition-colors">Docs</a>
                <a href="{{ config.extra.docs_rs_url }}" class="text-zinc-400 hover:text-zinc-200 transition-colors">API</a>
                <a href="{{ config.extra.github_url }}" class="text-zinc-400 hover:text-zinc-200 transition-colors">GitHub</a>
            </div>
        </div>
    </nav>

    {% block body %}{% endblock %}

    <footer class="border-t border-zinc-800/80 px-4 sm:px-6 py-8 mt-16">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4 text-[12px] text-zinc-600">
            <span>MIT License &middot; Built with Rust</span>
            <div class="flex items-center gap-4">
                <a href="{{ config.extra.github_url }}" class="hover:text-zinc-400 transition-colors">GitHub</a>
                <a href="{{ config.extra.docs_rs_url }}" class="hover:text-zinc-400 transition-colors">docs.rs</a>
                <a href="{{ config.extra.crates_io_url }}" class="hover:text-zinc-400 transition-colors">crates.io</a>
            </div>
        </div>
    </footer>
</body>
</html>
