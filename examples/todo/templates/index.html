{% extends "layout.html" %}
{% block title %}Todos{% endblock %}
{% block content %}
<main data-signals-title="''">
    <h1>Todos</h1>

    <form data-on-submit__prevent="@post('/todos'); $title = ''">
        <input type="text" placeholder="What needs doing?" autocomplete="off" data-bind-title>
        <button type="submit">Add</button>
    </form>

    <div id="todo-list">
        {% include "fragments/todo_list.html" %}
    </div>
</main>
{% endblock %}
