<div class="flex items-center gap-3 px-4 py-3 group">
  <button data-on:click="@put('/todos/{{ todo.id }}/toggle')" class="flex items-center gap-3 flex-1 min-w-0 text-left cursor-pointer">
    <span class="shrink-0 size-[18px] rounded-[4px] border flex items-center justify-center transition-colors {% if todo.completed %}border-amber-500/40 bg-amber-500/10{% else %}border-zinc-700 hover:border-zinc-600{% endif %}">{% if todo.completed %}<svg class="size-2.5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>{% endif %}</span>
    <span class="text-[13px] truncate {% if todo.completed %}line-through text-zinc-600{% else %}text-zinc-300{% endif %}">{{ todo.title }}</span>
  </button>
  <button data-on:click="@delete('/todos/{{ todo.id }}')" class="shrink-0 opacity-0 group-hover:opacity-100 text-zinc-600 hover:text-red-400 transition-all cursor-pointer p-0.5">
    <svg class="size-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
  </button>
</div>
