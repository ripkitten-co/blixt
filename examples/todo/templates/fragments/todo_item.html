<li class="flex items-center justify-between px-4 py-3 rounded-lg border border-zinc-800 bg-zinc-900/50">
  <button
    data-on-click="@put('/todos/{{ todo.id }}/toggle')"
    class="flex items-center gap-3 flex-1 text-left cursor-pointer"
  >
    <span class="size-5 rounded border flex items-center justify-center
      {% if todo.completed %}border-zinc-600 bg-zinc-700{% else %}border-zinc-600{% endif %}">
      {% if todo.completed %}
        <svg class="size-3 text-zinc-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      {% endif %}
    </span>
    <span class="{% if todo.completed %}line-through text-zinc-500{% else %}text-zinc-200{% endif %}">
      {{ todo.title }}
    </span>
  </button>
  <button
    data-on-click="@delete('/todos/{{ todo.id }}')"
    class="text-zinc-500 hover:text-red-400 transition-colors cursor-pointer ml-2 p-1"
  >
    <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>
</li>
