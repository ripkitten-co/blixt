name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.cargo/audit.toml'
      - '.github/workflows/audit.yml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit workspace
        run: cargo audit -f Cargo.lock
      - name: Audit examples/hello
        run: cargo audit -f examples/hello/Cargo.lock
      - name: Audit examples/todo
        run: cargo audit -f examples/todo/Cargo.lock
